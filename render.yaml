services:
  - type: web
    name: brainsjet-media-server
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: HF_TOKEN
        value: PASTE_YOUR_HF_KEY_HERE
      - key: REPLICATE_TOKEN
        value: PASTE_YOUR_REPLICATE_KEY_HERE
